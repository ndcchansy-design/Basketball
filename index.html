<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>業餘籃球戰術大腦 (Amateur Hoops IQ)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖標 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 戰術板與球場樣式 */
        .court-container {
            aspect-ratio: 5 / 4;
            position: relative;
            background-color: #fff7ed; /* orange-50 */
            border: 4px solid #1e293b; /* slate-800 */
            overflow: hidden;
            box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.05);
        }
        
        .player-node {
            position: absolute;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 2px solid white;
            transform: translate(-50%, -50%);
            z-index: 20;
        }

        .ball-node {
            position: absolute;
            width: 1rem;
            height: 1rem;
            background-color: #f97316; /* orange-500 */
            border-radius: 9999px;
            border: 1px solid #c2410c; /* orange-700 */
            box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            transform: translate(-50%, -50%);
            z-index: 30;
        }

        /* --- 動畫定義 (Keyframes) --- */
        
        /* 1. 高位擋拆 (Pick & Roll) - 6秒 */
        @keyframes pr-p1 { 0%, 20% { left: 50%; top: 20%; } 50%, 100% { left: 65%; top: 35%; } }
        @keyframes pr-p2 { 0%, 100% { left: 15%; top: 40%; } }
        @keyframes pr-p3 { 0%, 100% { left: 85%; top: 40%; } }
        @keyframes pr-p4 { 0%, 100% { left: 15%; top: 85%; } }
        @keyframes pr-p5 { 0% { left: 50%; top: 80%; } 20% { left: 50%; top: 30%; } 50%, 60% { left: 55%; top: 30%; } 100% { left: 50%; top: 75%; } }
        @keyframes pr-ball { 0%, 20% { left: 50%; top: 22%; } 50%, 60% { left: 67%; top: 37%; } 100% { left: 50%; top: 75%; } }

        .court-container[data-tactic="pick_and_roll"] .p1 { animation: pr-p1 6s ease-in-out infinite; }
        .court-container[data-tactic="pick_and_roll"] .p2 { animation: pr-p2 6s ease-in-out infinite; }
        .court-container[data-tactic="pick_and_roll"] .p3 { animation: pr-p3 6s ease-in-out infinite; }
        .court-container[data-tactic="pick_and_roll"] .p4 { animation: pr-p4 6s ease-in-out infinite; }
        .court-container[data-tactic="pick_and_roll"] .p5 { animation: pr-p5 6s ease-in-out infinite; }
        .court-container[data-tactic="pick_and_roll"] .ball-node { animation: pr-ball 6s ease-in-out infinite; }

        /* 2. 內外結合 (Post Up) - 6秒 */
        @keyframes pu-p1 { 0%, 100% { left: 50%; top: 20%; } }
        @keyframes pu-p2 { 0%, 100% { left: 85%; top: 40%; } }
        @keyframes pu-p3 { 0%, 100% { left: 15%; top: 40%; } }
        @keyframes pu-p4 { 0%, 100% { left: 35%; top: 60%; } }
        @keyframes pu-p5 { 0%, 100% { left: 70%; top: 75%; } }
        @keyframes pu-ball { 0% { left: 50%; top: 22%; } 20%, 30% { left: 83%; top: 40%; } 50% { left: 70%; top: 75%; } 100% { left: 17%; top: 40%; } }

        .court-container[data-tactic="post_up"] .p1 { animation: pu-p1 6s ease-in-out infinite; }
        .court-container[data-tactic="post_up"] .p2 { animation: pu-p2 6s ease-in-out infinite; }
        .court-container[data-tactic="post_up"] .p3 { animation: pu-p3 6s ease-in-out infinite; }
        .court-container[data-tactic="post_up"] .p4 { animation: pu-p4 6s ease-in-out infinite; }
        .court-container[data-tactic="post_up"] .p5 { animation: pu-p5 6s ease-in-out infinite; }
        .court-container[data-tactic="post_up"] .ball-node { animation: pu-ball 6s ease-in-out infinite; }

        /* 3. 切入分球 (Drive & Kick) - 5秒 */
        @keyframes dk-p1 { 0%, 20% { left: 50%; top: 20%; } 60%, 100% { left: 35%; top: 65%; } }
        @keyframes dk-p2 { 0%, 100% { left: 85%; top: 40%; } }
        @keyframes dk-p3 { 0%, 100% { left: 15%; top: 85%; } }
        @keyframes dk-p4 { 0%, 100% { left: 85%; top: 85%; } }
        @keyframes dk-p5 { 0%, 100% { left: 65%; top: 75%; } }
        @keyframes dk-ball { 0%, 20% { left: 50%; top: 22%; } 60%, 70% { left: 35%; top: 65%; } 100% { left: 15%; top: 85%; } }

        .court-container[data-tactic="drive_and_kick"] .p1 { animation: dk-p1 5s ease-in-out infinite; }
        .court-container[data-tactic="drive_and_kick"] .p2 { animation: dk-p2 5s ease-in-out infinite; }
        .court-container[data-tactic="drive_and_kick"] .p3 { animation: dk-p3 5s ease-in-out infinite; }
        .court-container[data-tactic="drive_and_kick"] .p4 { animation: dk-p4 5s ease-in-out infinite; }
        .court-container[data-tactic="drive_and_kick"] .p5 { animation: dk-p5 5s ease-in-out infinite; }
        .court-container[data-tactic="drive_and_kick"] .ball-node { animation: dk-ball 5s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-800 font-sans pb-12">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-6 shadow-md">
        <div class="max-w-5xl mx-auto flex items-center gap-3">
            <i class="fa-solid fa-basketball fa-2x text-blue-400"></i>
            <div>
                <h1 class="text-2xl font-bold tracking-wider">業餘籃球戰術大腦</h1>
                <p class="text-slate-400 text-sm">Amateur Hoops IQ - 專為亞洲工餘聯賽打造</p>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto mt-8 px-4">
        <!-- 進度條 -->
        <div class="flex items-center justify-center mb-8 gap-4 text-sm font-medium" id="progress-bar">
            <!-- 由 JS 動態更新 -->
        </div>

        <!-- 步驟 1 & 2: 名單與選擇 -->
        <div id="step-1-2-container" class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden block">
            <div class="p-6 border-b border-slate-200 bg-slate-50 flex justify-between items-center flex-wrap gap-4">
                <div>
                    <h2 class="text-xl font-bold flex items-center gap-2" id="step-title">
                        <i class="fa-solid fa-users"></i>
                        <span>球隊 12 人名單與能力值</span>
                    </h2>
                    <p class="text-slate-500 text-sm mt-1" id="step-subtitle">
                        檢視球員各項能力評級 (S=頂級, A=優秀, B=良好, C=普通, D=堪用, E=弱, F=極弱)
                    </p>
                </div>
                
                <button id="btn-next-step" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700 transition-colors flex items-center gap-2">
                    開始排兵布陣 <i class="fa-solid fa-chevron-right"></i>
                </button>
                
                <button id="btn-generate" class="hidden px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed">
                    生成專屬戰術 <i class="fa-solid fa-play"></i>
                </button>
            </div>

            <div class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="roster-grid">
                    <!-- 球員卡片由 JS 動態生成 -->
                </div>
            </div>
        </div>

        <!-- 步驟 3: 戰術動畫與解析 -->
        <div id="step-3-container" class="space-y-6 hidden">
            <!-- 戰術解說卡片 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col md:flex-row gap-6">
                <div class="flex-1">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-indigo-100 text-indigo-700 rounded-full text-sm font-bold mb-3">
                        <i class="fa-solid fa-chart-line"></i> AI 陣容分析結果
                    </div>
                    <h2 class="text-2xl font-bold text-slate-900 mb-2" id="tactic-title">載入中...</h2>
                    <p class="text-slate-600 leading-relaxed mb-4" id="tactic-desc"></p>
                    
                    <div class="bg-slate-50 p-4 rounded-lg border border-slate-100">
                        <h4 class="text-sm font-bold text-slate-700 mb-2 flex items-center gap-1">
                            <i class="fa-solid fa-circle-info"></i> 執行要點
                        </h4>
                        <ul class="text-sm text-slate-600 space-y-1 list-disc list-inside" id="tactic-points">
                            <!-- 由 JS 動態生成 -->
                        </ul>
                    </div>
                </div>
                
                <div class="w-full md:w-64 bg-slate-50 rounded-lg p-4 border border-slate-100">
                    <h3 class="font-bold text-slate-800 mb-3 text-center border-b border-slate-200 pb-2">場上 5 人</h3>
                    <div class="space-y-2" id="selected-players-list">
                        <!-- 由 JS 動態生成 -->
                    </div>
                    <button id="btn-restart" class="w-full mt-4 py-2 bg-white border border-slate-300 rounded text-sm font-medium text-slate-600 hover:bg-slate-50 flex items-center justify-center gap-2 transition-colors">
                        <i class="fa-solid fa-rotate-left"></i> 重新選擇陣容
                    </button>
                </div>
            </div>

            <!-- 戰術動畫區塊 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex flex-col items-center">
                <h3 class="text-lg font-bold mb-6">戰術動態圖解</h3>
                
                <!-- 戰術板 -->
                <div id="tactic-board" class="court-container w-full max-w-lg" data-tactic="pick_and_roll">
                    <!-- 半場線條 -->
                    <!-- 禁區 -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 border-x-4 border-b-4 border-slate-800" style="width: 32%; height: 45%;">
                        <!-- 罰球圈 -->
                        <div class="absolute bottom-0 left-1/2 -translate-x-1/2 translate-y-1/2 w-16 h-16 border-4 border-slate-800 rounded-full bg-[#fff7ed]"></div>
                    </div>
                    <!-- 三分線 -->
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 border-4 border-slate-800 border-t-0" style="width: 85%; height: 75%; border-bottom-left-radius: 50%; border-bottom-right-radius: 50%;"></div>
                    <!-- 籃板與籃框 -->
                    <div class="absolute left-1/2 -translate-x-1/2 w-16 h-1.5 bg-slate-800" style="top: 8%;"></div>
                    <div class="absolute left-1/2 -translate-x-1/2 translate-y-1.5 w-5 h-5 border-4 border-orange-500 rounded-full" style="top: 8%;"></div>

                    <!-- 動畫球員與球 -->
                    <div class="player-node bg-blue-600 p1">O1</div>
                    <div class="player-node bg-blue-600 p2">O2</div>
                    <div class="player-node bg-blue-600 p3">O3</div>
                    <div class="player-node bg-blue-600 p4">O4</div>
                    <div class="player-node bg-indigo-700 p5">O5</div>
                    <div class="ball-node"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- 評分轉換系統 ---
        const gradeToNum = { S: 6, A: 5, B: 4, C: 3, D: 2, E: 1, F: 0 };

        // --- 模擬球隊資料 (12人名單) ---
        const initialRoster = [
            { id: 1, name: '阿豪 (PG)', height: 175, weight: 70, drive: 'S', threePt: 'B', post: 'F', pass: 'A' },
            { id: 2, name: '小宇 (SG)', height: 180, weight: 75, drive: 'C', threePt: 'S', post: 'E', pass: 'C' },
            { id: 3, name: '建國 (SF)', height: 185, weight: 80, drive: 'B', threePt: 'C', post: 'C', pass: 'B' },
            { id: 4, name: '大軍 (PF)', height: 190, weight: 90, drive: 'D', threePt: 'D', post: 'A', pass: 'C' },
            { id: 5, name: '老王 (C)', height: 195, weight: 105, drive: 'F', threePt: 'F', post: 'S', pass: 'B' },
            { id: 6, name: '阿傑 (PG/SG)', height: 178, weight: 72, drive: 'B', threePt: 'A', post: 'F', pass: 'B' },
            { id: 7, name: '小林 (SF)', height: 183, weight: 78, drive: 'C', threePt: 'A', post: 'D', pass: 'C' },
            { id: 8, name: '阿明 (PF/C)', height: 188, weight: 95, drive: 'D', threePt: 'E', post: 'B', pass: 'D' },
            { id: 9, name: '志強 (SG)', height: 176, weight: 68, drive: 'B', threePt: 'B', post: 'F', pass: 'C' },
            { id: 10, name: '大黑 (C)', height: 192, weight: 110, drive: 'F', threePt: 'F', post: 'B', pass: 'E' },
            { id: 11, name: '阿飛 (SF)', height: 186, weight: 82, drive: 'A', threePt: 'D', post: 'C', pass: 'C' },
            { id: 12, name: '小陳 (PG)', height: 170, weight: 65, drive: 'B', threePt: 'C', post: 'F', pass: 'S' },
        ];

        // --- 狀態管理 ---
        let step = 1;
        let selectedIds = [];

        // --- DOM 元素 ---
        const rosterGrid = document.getElementById('roster-grid');
        const progressBar = document.getElementById('progress-bar');
        const stepTitle = document.getElementById('step-title').querySelector('span');
        const stepSubtitle = document.getElementById('step-subtitle');
        const btnNextStep = document.getElementById('btn-next-step');
        const btnGenerate = document.getElementById('btn-generate');
        const btnRestart = document.getElementById('btn-restart');
        
        const step12Container = document.getElementById('step-1-2-container');
        const step3Container = document.getElementById('step-3-container');

        // --- 初始化與渲染 ---
        function init() {
            renderPlayers();
            updateUI();
            
            // 綁定按鈕事件
            btnNextStep.addEventListener('click', () => {
                step = 2;
                updateUI();
                renderPlayers(); // 重新渲染以顯示選擇框
            });

            btnGenerate.addEventListener('click', () => {
                if (selectedIds.length === 5) {
                    step = 3;
                    generateTactic();
                    updateUI();
                }
            });

            btnRestart.addEventListener('click', () => {
                step = 2;
                selectedIds = [];
                updateUI();
                renderPlayers();
            });
        }

        // 渲染球員卡片
        function renderPlayers() {
            rosterGrid.innerHTML = '';
            initialRoster.forEach(player => {
                const isSelected = selectedIds.includes(player.id);
                
                // 判斷能力值顏色
                const driveColor = ['S', 'A'].includes(player.drive) ? 'text-red-500' : '';
                const threeColor = ['S', 'A'].includes(player.threePt) ? 'text-blue-500' : '';
                const postColor = ['S', 'A'].includes(player.post) ? 'text-green-500' : '';
                const passColor = ['S', 'A'].includes(player.pass) ? 'text-purple-500' : '';

                const card = document.createElement('div');
                card.className = `p-4 rounded-xl border-2 transition-all ${
                    step === 2 ? 'cursor-pointer hover:shadow-md' : ''
                } ${
                    isSelected ? 'border-blue-500 bg-blue-50' : 'border-slate-100 bg-white'
                }`;
                
                // 點擊事件 (僅在步驟 2 有效)
                if (step === 2) {
                    card.addEventListener('click', () => togglePlayer(player.id));
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <h3 class="font-bold text-lg">${player.name}</h3>
                            <p class="text-xs text-slate-500">${player.height}cm / ${player.weight}kg</p>
                        </div>
                        ${step === 2 ? `
                            <div class="w-6 h-6 rounded-full border-2 flex items-center justify-center ${isSelected ? 'border-blue-500 bg-blue-500' : 'border-slate-300'}">
                                ${isSelected ? '<div class="w-2 h-2 bg-white rounded-full"></div>' : ''}
                            </div>
                        ` : ''}
                    </div>
                    <div class="grid grid-cols-4 gap-2 text-center text-xs">
                        <div class="bg-slate-100 p-1 rounded"><span class="block text-slate-500 scale-90">切入</span><span class="font-bold ${driveColor}">${player.drive}</span></div>
                        <div class="bg-slate-100 p-1 rounded"><span class="block text-slate-500 scale-90">三分</span><span class="font-bold ${threeColor}">${player.threePt}</span></div>
                        <div class="bg-slate-100 p-1 rounded"><span class="block text-slate-500 scale-90">低位</span><span class="font-bold ${postColor}">${player.post}</span></div>
                        <div class="bg-slate-100 p-1 rounded"><span class="block text-slate-500 scale-90">傳球</span><span class="font-bold ${passColor}">${player.pass}</span></div>
                    </div>
                `;
                rosterGrid.appendChild(card);
            });
        }

        // 處理選擇球員
        function togglePlayer(id) {
            if (selectedIds.includes(id)) {
                selectedIds = selectedIds.filter(pid => pid !== id);
            } else {
                if (selectedIds.length < 5) {
                    selectedIds.push(id);
                }
            }
            renderPlayers();
            updateGenerateButton();
            
            // 更新副標題人數
            if(step === 2) {
                stepSubtitle.innerText = `已選擇: ${selectedIds.length} / 5 人`;
            }
        }

        // 更新介面狀態 (進度條、標題、容器顯示)
        function updateUI() {
            // 1. 更新進度條
            progressBar.innerHTML = `
                <div class="flex items-center gap-2 ${step >= 1 ? 'text-blue-600' : 'text-slate-400'}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center ${step >= 1 ? 'bg-blue-600 text-white' : 'bg-slate-200'}">1</div>
                    球隊名單
                </div>
                <div class="w-12 h-1 bg-slate-200 rounded"><div class="h-full bg-blue-600 rounded transition-all" style="width: ${step >= 2 ? '100%' : '0%'}"></div></div>
                <div class="flex items-center gap-2 ${step >= 2 ? 'text-blue-600' : 'text-slate-400'}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center ${step >= 2 ? 'bg-blue-600 text-white' : 'bg-slate-200'}">2</div>
                    選擇先發 5 人
                </div>
                <div class="w-12 h-1 bg-slate-200 rounded"><div class="h-full bg-blue-600 rounded transition-all" style="width: ${step >= 3 ? '100%' : '0%'}"></div></div>
                <div class="flex items-center gap-2 ${step >= 3 ? 'text-blue-600' : 'text-slate-400'}">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center ${step >= 3 ? 'bg-blue-600 text-white' : 'bg-slate-200'}">3</div>
                    AI 戰術生成
                </div>
            `;

            // 2. 切換容器顯示
            if (step === 1 || step === 2) {
                step12Container.classList.remove('hidden');
                step3Container.classList.add('hidden');
                
                if (step === 1) {
                    stepTitle.innerText = '球隊 12 人名單與能力值';
                    stepSubtitle.innerText = '檢視球員各項能力評級 (S=頂級, A=優秀, B=良好, C=普通, D=堪用, E=弱, F=極弱)';
                    btnNextStep.classList.remove('hidden');
                    btnGenerate.classList.add('hidden');
                } else {
                    stepTitle.innerText = '請選擇上場的 5 名球員';
                    stepSubtitle.innerText = `已選擇: ${selectedIds.length} / 5 人`;
                    btnNextStep.classList.add('hidden');
                    btnGenerate.classList.remove('hidden');
                    updateGenerateButton();
                }
            } else if (step === 3) {
                step12Container.classList.add('hidden');
                step3Container.classList.remove('hidden');
            }
        }

        // 更新生成按鈕狀態
        function updateGenerateButton() {
            if (selectedIds.length === 5) {
                btnGenerate.className = "px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 bg-green-600 text-white hover:bg-green-700 shadow-md";
                btnGenerate.disabled = false;
            } else {
                btnGenerate.className = "px-6 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 bg-slate-200 text-slate-400 cursor-not-allowed";
                btnGenerate.disabled = true;
            }
        }

        // 分析陣容並生成戰術
        function generateTactic() {
            const lineup = initialRoster.filter(p => selectedIds.includes(p.id));
            
            // 計算各項能力最高分與平均
            const maxPost = Math.max(...lineup.map(p => gradeToNum[p.post]));
            const maxDrive = Math.max(...lineup.map(p => gradeToNum[p.drive]));
            const threePtAvg = lineup.reduce((sum, p) => sum + gradeToNum[p.threePt], 0) / 5;

            let tactic = 'pick_and_roll';
            let title = '高位擋拆 (High Pick & Roll)';
            let desc = '這套陣容的持球者與掩護者能力均衡，適合利用簡單的高位擋拆製造錯位或切入空間，是業餘聯賽最實用的基礎戰術。';
            let points = [
                '掩護者需確實擋住防守者 (Set a solid screen)。',
                '持球者需緊貼掩護者切入，不留縫隙。',
                '根據防守方的應對（換防、包夾、沉退）決定傳球或自己進攻。'
            ];

            if (maxPost >= 5) { // 有 A 或 S 級低位球員
                tactic = 'post_up';
                title = '內外結合 (Inside-Out / Post Up)';
                desc = '陣容中擁有極具破壞力的內線球員。戰術核心是將球送入低位吸引包夾，再分球給外圍射手或空切球員。';
                points = [
                    '將球安全交給低位優勢球員。',
                    '外圍球員需保持距離，拉開空間 (Spacing)。',
                    '一旦遭遇包夾，低位球員需迅速將球傳給對角線空檔。'
                ];
            } else if (maxDrive >= 5 && threePtAvg >= 3) { // 有極強切入且外線尚可
                tactic = 'drive_and_kick';
                title = '切入分球 (Drive & Kick)';
                desc = '陣容擁有突破能力極強的後衛。利用拉開空間 (Spacing) 讓後衛單打突破，吸引協防後分球給外線空檔。';
                points = [
                    '清空一側 (Clear out) 讓切入能力強的後衛單打。',
                    '切入者需觀察協防者的動向。',
                    '射手需隨時準備接球投籃，不要猶豫。'
                ];
            }

            // 更新 DOM
            document.getElementById('tactic-title').innerText = title;
            document.getElementById('tactic-desc').innerText = desc;
            
            const pointsHtml = points.map(p => `<li>${p}</li>`).join('');
            document.getElementById('tactic-points').innerHTML = pointsHtml;

            const playersHtml = lineup.map((p, i) => `
                <div class="flex justify-between items-center text-sm">
                    <span class="font-medium text-slate-700">O${i+1} ${p.name.split(' ')[0]}</span>
                    <span class="text-xs text-slate-500">${p.name.split(' ')[1].replace(/[()]/g, '')}</span>
                </div>
            `).join('');
            document.getElementById('selected-players-list').innerHTML = playersHtml;

            // 切換戰術板動畫
            document.getElementById('tactic-board').setAttribute('data-tactic', tactic);
        }

        // 啟動程式
        init();

    </script>
</body>
</html>
